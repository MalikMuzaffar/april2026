<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Page</h1>
        <p>This is a simple HTML file created for you. It includes:</p>
        <ul>
            <li>Basic HTML structure</li>
            <li>Embedded CSS for styling</li>
            <li>A little bit of JavaScript</li>
        </ul>

        <button onclick="greet()">Click Me!</button>

        <p id="message"></p>
    </div>

    <script>
        function greet() {
            document.getElementById('message').innerHTML = "Hello! Thanks for clicking the button.";
        }
    </script>

</body>
</html>
